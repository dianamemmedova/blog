<div class="mt-2">

</div>

<div class="container">
    <div class="row">
        @for(post of blogData | slice: (page-1) * pageSize : page * pageSize; track post.id){
            <div class="col-md-3 col-sm-6 mt-5">
             <mat-card class="example-card" appearance="outlined">
                <mat-card-header>
                    <mat-card-title class="title">{{post.title}}</mat-card-title>
                </mat-card-header>

                <img mat-card-image src="./image{{post.imageId}}.jpg" alt="Photo of a Shiba Inu">
                
                <mat-card-content>
                <p class="body">{{post.body}} </p>
                </mat-card-content>
                <mat-card-actions>
                   <button (click)="open(post ,false)" mat-button>Görüntüle</button>
                   <button (click)="open(post ,true)" mat-button>Düzenle</button>
               </mat-card-actions>
             </mat-card>
            </div>
        }
    
    </div>  
</div>

        <div class="pagination">
        <ngb-pagination [(page)]="page"
                        [pageSize]="pageSize"
                        [collectionSize]="blogData.length" />

        </div>
